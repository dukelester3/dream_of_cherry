<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>浮水印示範</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 24px; max-width: 900px; margin: 0 auto; background: #1a1a1a; color: #eee; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p { color: #999; font-size: 0.9rem; margin-bottom: 20px; }
    .demo-area { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    @media (max-width: 600px) { .demo-area { grid-template-columns: 1fr; } }
    .box { background: #2a2a2a; border-radius: 12px; padding: 16px; }
    .box h3 { margin: 0 0 12px; font-size: 0.9rem; color: #ccc; }
    .box img { width: 100%; height: auto; max-height: 280px; object-fit: contain; display: block; border-radius: 8px; background: #111; cursor: zoom-in; }
    .box .placeholder { aspect-ratio: 4/3; background: #222; border: 2px dashed #444; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #666; font-size: 0.85rem; }
    .box .placeholder:has(img) { flex-direction: column; align-items: stretch; border-style: solid; border-color: #333; }
    .zoom-hint { font-size: 0.75rem; color: #666; margin-top: 6px; }
    .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 9999; cursor: zoom-out; padding: 20px; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 95vw; max-height: 95vh; object-fit: contain; }
    input[type="file"] { margin-bottom: 12px; }
    .spec { font-size: 0.8rem; color: #888; margin-top: 12px; line-height: 1.6; }
  </style>
</head>
<body>
  <h1>浮水印示範</h1>
  <p>選擇一張圖片，左邊顯示原圖，右邊顯示加上浮水印後的效果。<strong>點擊圖片可放大</strong>。</p>
  <input type="file" id="fileInput" accept="image/*">
  <div class="demo-area">
    <div class="box">
      <h3>原圖</h3>
      <div id="original" class="placeholder">尚未選擇圖片</div>
    </div>
    <div class="box">
      <h3>加浮水印後</h3>
      <div id="watermarked" class="placeholder">選擇圖片後顯示</div>
    </div>
  </div>
  <div id="lightbox" class="lightbox">
    <img id="lightboxImg" src="" alt="放大預覽">
  </div>
  <div class="spec">
    <strong>浮水印設定：</strong><br>
    • 位置：右下角<br>
    • 大小：約 1/16 面積，略偏左<br>
    • 透明度：100%（不透明）<br>
    • Logo 路徑：<code>logo/logo-trimmed.png</code>（已裁切空白）
  </div>

  <script>
    const LOGO = './logo/logo-trimmed.png';
    const fileInput = document.getElementById('fileInput');
    const originalEl = document.getElementById('original');
    const watermarkedEl = document.getElementById('watermarked');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');

    function setupZoom(img) {
      img.onclick = (e) => { e.stopPropagation(); lightboxImg.src = img.src; lightbox.classList.add('open'); };
    }
    lightbox.onclick = () => lightbox.classList.remove('open');
    lightboxImg.onclick = (e) => e.stopPropagation();
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') lightbox.classList.remove('open'); });

    fileInput.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        originalEl.innerHTML = '';
        const img = document.createElement('img');
        img.src = reader.result;
        img.alt = '原圖';
        img.title = '點擊放大';
        originalEl.appendChild(img);
        originalEl.appendChild(document.createElement('div')).className = 'zoom-hint';
        originalEl.lastChild.textContent = '點擊圖片放大';
        setupZoom(img);
      };
      reader.readAsDataURL(file);

      watermarkedEl.innerHTML = '<span style="color:#888">處理中...</span>';
      try {
        const result = await addWatermark(file);
        const url = URL.createObjectURL(result);
        watermarkedEl.innerHTML = '';
        const img = document.createElement('img');
        img.src = url;
        img.alt = '浮水印';
        img.title = '點擊放大';
        watermarkedEl.appendChild(img);
        watermarkedEl.appendChild(document.createElement('div')).className = 'zoom-hint';
        watermarkedEl.lastChild.textContent = '點擊圖片放大';
        setupZoom(img);
      } catch (err) {
        watermarkedEl.innerHTML = '<span style="color:#e55">失敗：' + err.message + '</span>';
      }
    };

    async function addWatermark(file) {
      return new Promise((resolve) => {
        const img = new Image();
        const objectUrl = URL.createObjectURL(file);
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          const logoImg = new Image();
          logoImg.crossOrigin = 'anonymous';
          logoImg.onload = () => {
            const cellW = img.width / 4;
            const cellH = img.height / 4;
            let logoW, logoH;
            if (logoImg.width / logoImg.height >= cellW / cellH) {
              logoW = cellW;
              logoH = (logoImg.height / logoImg.width) * logoW;
            } else {
              logoH = cellH;
              logoW = (logoImg.width / logoImg.height) * logoH;
            }
            const pad = 4;
            const leftOffset = img.width * 0.08;
            const x = img.width - logoW - pad - leftOffset;
            const y = img.height - logoH - pad;
            ctx.globalAlpha = 1;
            ctx.drawImage(logoImg, x, y, logoW, logoH);
            ctx.globalAlpha = 1;
            canvas.toBlob(blob => {
              URL.revokeObjectURL(objectUrl);
              resolve(blob ? new File([blob], file.name, { type: file.type }) : file);
            }, file.type || 'image/jpeg', 0.92);
          };
          logoImg.onerror = () => { URL.revokeObjectURL(objectUrl); resolve(file); };
          logoImg.src = LOGO;
        };
        img.onerror = () => { URL.revokeObjectURL(objectUrl); resolve(file); };
        img.src = objectUrl;
      });
    }
  </script>
</body>
</html>
